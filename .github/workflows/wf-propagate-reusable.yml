# ==============================================================================
# 再利用可能ワークフロー: ブランチへ変更を伝播
# ==============================================================================
#
# 【概要】
#   main への PR マージ後、staging と develop ブランチへ変更を直接伝播する。
#   呼び出し元リポジトリの .github/workflows/wf-propagate.yml から workflow_call で起動される。
#
# 【処理フロー】
#   1. 全履歴付きでリポジトリをチェックアウト
#   2. GitHub Actions ボットとして git コミットできるようユーザー情報を設定
#   3. main → staging へ git merge & push（コンフリクト時は Slack 通知）
#   4. main → develop へ git merge & push（コンフリクト時は Slack 通知）
#
# 【伝播ルール】
#   - base_ref が 'main' の場合のみ staging / develop へ伝播する
#   - staging または develop への PR マージ時は何も行わない
#
# 【注意】
#   - sf-metasync.sh による自動 push（ボット push）ではこのワークフローは発火しない
#     （呼び出し元の on: pull_request は PR マージ時のみトリガー）
#   - Salesforce メタデータの下流伝播は sf-metasync.sh 自身が担う
#
# 【inputs 一覧】
#   base_ref  : マージ先ブランチ名（例: main）。伝播先の判定に使用。
#   head_ref  : マージ元ブランチ名（未使用。呼び出し元との入力形式統一のため宣言）
#   pr_title  : PR タイトル（未使用。呼び出し元との入力形式統一のため宣言）
#   pr_number : PR 番号。Slack 通知の表示に使用。
#   pr_url    : PR URL。Slack 通知のリンクに使用。
#   pr_sha    : PR コミット SHA（未使用。呼び出し元との入力形式統一のため宣言）
#
# 【必要な GitHub Secrets（呼び出し元リポジトリに設定すること）】
#   SLACK_BOT_TOKEN  : Slack API の Bot Token（コンフリクト時の通知に使用）
#   SLACK_CHANNEL_ID : 通知先 Slack チャンネル ID
#
# ==============================================================================
name: sf-propagate（再利用可能）

on:
  workflow_call:
    inputs:
      base_ref:
        description: "マージ先ブランチ名"
        type: string
        default: ""
      head_ref:
        description: "マージ元ブランチ名（未使用）"
        type: string
        default: ""
      pr_title:
        description: "PR タイトル（未使用）"
        type: string
        default: ""
      pr_number:
        description: "PR 番号（未使用）"
        type: string
        default: ""
      pr_url:
        description: "PR URL（未使用）"
        type: string
        default: ""
      pr_sha:
        description: "PR コミット SHA（未使用）"
        type: string
        default: ""
    secrets:
      SLACK_BOT_TOKEN:
        required: false
      SLACK_CHANNEL_ID:
        required: false

# git push を行うためリポジトリへの書き込み権限を付与
permissions:
  contents: write

jobs:
  propagate:
    name: 下流ブランチへ変更を伝播
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------------------------------
      # Step 1: 全履歴付きでリポジトリをチェックアウト
      # --------------------------------------------------------------------------
      # fetch-depth: 0 で全履歴を取得。
      # git merge 後の push に使用する GITHUB_TOKEN も明示的に渡す。
      - name: ソースコードを取得
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------------------------------
      # Step 2: Git コミット用ユーザー情報の設定
      # --------------------------------------------------------------------------
      # merge コミットが作成される場合のコミッター情報を設定する。
      # GitHub Actions のボットアカウント形式にすることで手動コミットと区別できる。
      - name: Git ユーザー情報を設定
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # --------------------------------------------------------------------------
      # Step 3: main → staging へ変更を伝播
      # --------------------------------------------------------------------------
      # base_ref が main の場合のみ実行。
      # origin/main の内容を staging にマージし、リモートへ push する。
      # --no-edit: マージコミットメッセージをデフォルトのままにして入力待ちを防ぐ。
      # コンフリクト発生時はマージを中止し、結果を GITHUB_OUTPUT に記録する。
      - name: main から staging へ変更を伝播
        id: merge_staging
        if: inputs.base_ref == 'main'
        run: |
          git checkout staging
          if git merge origin/main --no-edit; then
            git push origin staging
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            echo "::error title=コンフリクト::main → staging のマージでコンフリクトが発生しました。手動で解消してください。"
          fi

      # --------------------------------------------------------------------------
      # Step 4: main → develop へ変更を伝播
      # --------------------------------------------------------------------------
      # base_ref が main の場合のみ実行。staging と同様の処理を develop に対して行う。
      - name: main から develop へ変更を伝播
        id: merge_develop
        if: inputs.base_ref == 'main'
        run: |
          git checkout develop
          if git merge origin/main --no-edit; then
            git push origin develop
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            echo "::error title=コンフリクト::main → develop のマージでコンフリクトが発生しました。手動で解消してください。"
          fi

      # --------------------------------------------------------------------------
      # Step 5: コンフリクト発生時の Slack 通知
      # --------------------------------------------------------------------------
      # staging または develop でコンフリクトが発生した場合のみ実行。
      # どのブランチでコンフリクトが発生したかを明示し、手動対応を促す。
      - name: コンフリクト発生時に Slack へ通知
        if: |
          always() && inputs.base_ref == 'main' && (
            steps.merge_staging.outputs.result == 'conflict' ||
            steps.merge_develop.outputs.result == 'conflict'
          )
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          CONFLICTS=""
          if [ "${{ steps.merge_staging.outputs.result }}" = "conflict" ]; then
            CONFLICTS="staging"
          fi
          if [ "${{ steps.merge_develop.outputs.result }}" = "conflict" ]; then
            CONFLICTS="${CONFLICTS:+$CONFLICTS, }develop"
          fi

          PR_TITLE="${{ inputs.pr_title }}"
          PR_NUMBER="${{ inputs.pr_number }}"
          PR_URL="${{ inputs.pr_url }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATETIME=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S JST')

          PR_TEXT=""
          if [ -n "$PR_NUMBER" ]; then
            PR_TEXT="\n• PR: <${PR_URL}|#${PR_NUMBER} ${PR_TITLE}>"
          fi

          MESSAGE=":rotating_light: *ブランチ伝播でコンフリクトが発生しました*\n• main → \`${CONFLICTS}\` のマージに失敗\n• 手動でコンフリクトを解消してください${PR_TEXT}\n• 実行日時: ${DATETIME}\n• <${RUN_URL}|Actions ログを見る>"
          PAYLOAD="{\"channel\": \"${SLACK_CHANNEL_ID}\", \"text\": \"${MESSAGE}\"}"

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # --------------------------------------------------------------------------
      # Step 6: コンフリクトがあった場合はジョブを失敗させる
      # --------------------------------------------------------------------------
      - name: コンフリクト発生時はジョブを失敗させる
        if: |
          always() && inputs.base_ref == 'main' && (
            steps.merge_staging.outputs.result == 'conflict' ||
            steps.merge_develop.outputs.result == 'conflict'
          )
        run: exit 1
