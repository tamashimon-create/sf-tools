# ==============================================================================
# wf-metasync-reusable.yml - Salesforce メタデータ自動同期（再利用可能ワークフロー）
# ==============================================================================
#
# 【概要】
#   Salesforce 本番組織の最新メタデータを取得し、Git の main ブランチへ自動同期する。
#   force-* リポジトリの wf-metasync.yml（caller）から workflow_call で起動される。
#
# 【必要な GitHub Secrets（呼び出し元リポジトリに設定すること）】
#   SFDX_AUTH_URL_PROD : Salesforce 本番組織の認証 URL
#   PAT_TOKEN          : GitHub PAT（ブランチ保護ルールのバイパスに使用）
#
# ==============================================================================
on:
  workflow_call:
    secrets:
      SFDX_AUTH_URL_PROD:
        required: true
      PAT_TOKEN:
        required: true

jobs:
  sync:
    name: メタデータ同期
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --------------------------------------------------------------------------
      # Step 1: リポジトリの main ブランチを完全な履歴付きでチェックアウト
      # --------------------------------------------------------------------------
      - name: ソースコードを取得
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      # --------------------------------------------------------------------------
      # Step 2: Node.js のセットアップ
      # --------------------------------------------------------------------------
      - name: Node.js をインストール
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------------------------------------------------------
      # Step 3: Java のセットアップ（SGD の実行に必要）
      # --------------------------------------------------------------------------
      - name: Java をインストール（差分抽出ツール用）
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # --------------------------------------------------------------------------
      # Step 4: Salesforce CLI のインストール
      # --------------------------------------------------------------------------
      - name: Salesforce CLI をインストール
        run: npm install --global @salesforce/cli

      # --------------------------------------------------------------------------
      # Step 5: Salesforce Git Delta（SGD）プラグインのインストール
      # --------------------------------------------------------------------------
      - name: 差分抽出ツール（Salesforce Git Delta）をインストール
        run: echo y | sf plugins install sfdx-git-delta

      # --------------------------------------------------------------------------
      # Step 6: Salesforce 本番組織への認証
      # --------------------------------------------------------------------------
      - name: Salesforce 組織にログイン
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_PROD }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --set-default --alias tama
          rm -f auth.txt

      # --------------------------------------------------------------------------
      # Step 7: Git コミット用ユーザー情報の設定
      # --------------------------------------------------------------------------
      - name: Git ユーザー情報を設定
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # --------------------------------------------------------------------------
      # Step 8: sf-tools のクローン
      # --------------------------------------------------------------------------
      - name: 自動化ツール（sf-tools）を取得
        run: git clone https://github.com/tama-create/sf-tools.git ~/sf-tools

      # --------------------------------------------------------------------------
      # Step 9: メタデータ取得・Git 同期の実行
      # --------------------------------------------------------------------------
      - name: メタデータ取得・Git 同期を実行
        run: |
          chmod +x ~/sf-tools/sf-metasync.sh
          ~/sf-tools/sf-metasync.sh
