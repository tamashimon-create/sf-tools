# ==============================================================================
# 再利用可能ワークフロー: Salesforce メタデータ自動同期
# ==============================================================================
#
# 【概要】
#   Salesforce 本番組織の最新メタデータを取得し、Git の main ブランチへ自動同期する。
#   呼び出し元リポジトリの .github/workflows/sf-metasync.yml から workflow_call で起動される。
#
# 【処理フロー】
#   1. リポジトリの main ブランチを全履歴付きでチェックアウト
#   2. Node.js / Java / Salesforce CLI / SGD（差分抽出ツール）をインストール
#   3. GitHub Secrets の SFDX_AUTH_URL_PROD を使って本番組織に認証
#   4. GitHub Actions ボットとして git コミットできるようユーザー情報を設定
#   5. sf-tools リポジトリをクローンして sf-metasync.sh を取得
#   6. sf-metasync.sh を実行（差分取得 → メタデータ retrieve → コミット → プッシュ）
#
# 【必要な GitHub Secrets（呼び出し元リポジトリに設定すること）】
#   SFDX_AUTH_URL_PROD : Salesforce 本番組織の認証 URL
#                        取得方法: sf org display --verbose --json | grep sfdxAuthUrl
#                        例: force://PlatformCLI::token@domain.salesforce.com
#
# 【前提条件】
#   - 呼び出し元リポジトリのデフォルトブランチが main であること
#   - main ブランチに staging / develop ブランチが存在すること（下流伝播に必要）
#   - リポジトリの Settings → Actions → General にて
#     「Allow GitHub Actions to create and approve pull requests」が有効なこと
#
# ==============================================================================
name: sf-metasync（再利用可能）

on:
  workflow_call:
    secrets:
      SFDX_AUTH_URL_PROD:
        required: true

jobs:
  sync:
    name: Salesforce メタデータを取得して Git へ同期
    runs-on: ubuntu-latest

    # git push を行うためリポジトリへの書き込み権限を付与
    permissions:
      contents: write

    steps:
      # --------------------------------------------------------------------------
      # Step 1: リポジトリの main ブランチを完全な履歴付きでチェックアウト
      # --------------------------------------------------------------------------
      # fetch-depth: 0 は必須。
      # SGD（Salesforce Git Delta）が「前回同期コミット」との差分を比較するために
      # リポジトリの全コミット履歴を必要とするため、浅いクローン（shallow clone）では動作しない。
      - name: ソースコードを取得
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      # --------------------------------------------------------------------------
      # Step 2: Node.js のセットアップ
      # --------------------------------------------------------------------------
      # Salesforce CLI（@salesforce/cli）は npm パッケージとして配布されているため、
      # Node.js が必要。バージョン 20 は Salesforce CLI の動作推奨バージョン。
      - name: Node.js をインストール
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      # --------------------------------------------------------------------------
      # Step 3: Java のセットアップ（SGD の実行に必要）
      # --------------------------------------------------------------------------
      # SGD（sfdx-git-delta）は内部で Java を使用する。
      # Temurin は OpenJDK の無償配布版で、GitHub Actions での利用実績が豊富。
      # バージョン 17 は SGD の推奨要件。
      - name: Java をインストール（差分抽出ツール用）
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      # --------------------------------------------------------------------------
      # Step 4: Salesforce CLI のインストール
      # --------------------------------------------------------------------------
      # sf コマンドを使って組織認証・メタデータ取得を行う。
      # GitHub Actions のランナーには事前インストールされていないため毎回インストールする。
      - name: Salesforce CLI をインストール
        run: npm install --global @salesforce/cli

      # --------------------------------------------------------------------------
      # Step 5: Salesforce Git Delta（SGD）プラグインのインストール
      # --------------------------------------------------------------------------
      # 前回の同期コミットから現在までの差分を解析し package.xml を自動生成するツール。
      # インストール時の「プラグインを信頼しますか？」というインタラクティブプロンプトを
      # 'echo y' でパイプして自動承認する。
      - name: 差分抽出ツール（Salesforce Git Delta）をインストール
        run: echo y | sf plugins install sfdx-git-delta

      # --------------------------------------------------------------------------
      # Step 6: Salesforce 本番組織への認証
      # --------------------------------------------------------------------------
      # GitHub Secrets から認証 URL を一時ファイルに書き出し、sfdx-url 認証方式でログイン。
      # --set-default: 以降の sf コマンドで組織を明示指定しなくて済むようデフォルトに設定
      # --alias tama: sf-metasync.sh 内で参照するエイリアス名
      # セキュリティのため、認証完了後は即座に認証ファイルを削除する。
      - name: Salesforce 組織にログイン
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_PROD }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --set-default --alias tama
          rm -f auth.txt

      # --------------------------------------------------------------------------
      # Step 7: Git コミット用ユーザー情報の設定
      # --------------------------------------------------------------------------
      # sf-metasync.sh がメタデータ変更を git commit する際のコミッター情報を設定する。
      # GitHub Actions のボットアカウント形式にすることで、手動コミットと区別しやすくなる。
      # このコミットは GitHub 上でボットアイコン付きで表示される。
      - name: Git ユーザー情報を設定
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # --------------------------------------------------------------------------
      # Step 8: sf-tools のクローン
      # --------------------------------------------------------------------------
      # sf-metasync.sh の実行に必要な sf-tools 一式をホームディレクトリへ取得する。
      # sf-tools は public リポジトリのため認証なしでクローン可能。
      # ~/sf-tools に配置することで sf-metasync.sh 内のパス解決と一致する。
      - name: 自動化ツール（sf-tools）を取得
        run: git clone https://github.com/tama-create/sf-tools.git ~/sf-tools

      # --------------------------------------------------------------------------
      # Step 9: メタデータ取得・Git 同期の実行
      # --------------------------------------------------------------------------
      # sf-metasync.sh の処理内容:
      #   1. SGD で前回同期コミットからの差分 package.xml を生成
      #   2. package.xml を使って Salesforce から差分メタデータを retrieve
      #   3. 主要メタデータタイプ（ApexClass / LWC / Flow 等）を一括 retrieve
      #   4. 変更がある場合のみ git add → commit → push（main ブランチへ）
      #   5. main → staging / develop へ変更を直接伝播（git merge & push）
      # 変更がない場合は何もせず正常終了する（RET_NO_CHANGE = exit 2）。
      - name: メタデータ取得・Git 同期を実行
        run: |
          chmod +x ~/sf-tools/sf-metasync.sh
          ~/sf-tools/sf-metasync.sh
