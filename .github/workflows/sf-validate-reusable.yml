# ==============================================================================
# 再利用可能ワークフロー: Salesforce デプロイ前検証
# ==============================================================================
#
# 【概要】
#   PR 作成・更新時に sf-release.sh を「検証のみ（本番反映なし）」で実行する。
#   呼び出し元リポジトリの .github/workflows/sf-validate.yml から workflow_call で起動される。
#   検証結果は PR にコメントとして投稿され、失敗時はマージがブロックされる。
#
# 【処理フロー】
#   1. PR のソースブランチをチェックアウト
#   2. Node.js / Salesforce CLI をインストール
#   3. sf-tools をクローン（sf-release.sh の取得）
#   4. マージ先ブランチに応じて接続する Salesforce 組織を選択
#   5. 選択した組織に認証
#   6. sf-release.sh が参照する branch_name.txt を動的生成
#   7. sf-release.sh を検証モード（--release なし）で実行
#   8. 検証結果を PR にコメントとして投稿
#   9. 検証失敗時はマージをブロック（exit 1）
#
# 【必要な GitHub Secrets（呼び出し元リポジトリに設定すること）】
#   SFDX_AUTH_URL_PROD : 本番組織の認証 URL（main ブランチへの PR 時に使用）
#   SFDX_AUTH_URL_STG  : ステージング組織の認証 URL（staging ブランチへの PR 時に使用）
#   SFDX_AUTH_URL_DEV  : 開発組織の認証 URL（develop およびその他ブランチへの PR 時に使用）
#
# 【必要な permissions（呼び出し元ジョブに設定すること）】
#   pull-requests: write  # PR へのコメント投稿に必要
#
# 【inputs 一覧】
#   base_ref  : マージ先ブランチ名。接続組織の選択に使用。
#   head_ref  : マージ元ブランチ名（フィーチャーブランチ）。branch_name.txt の書き込みと
#               PR コメントの表示に使用。
#   pr_title  : PR タイトル（未使用。呼び出し元との入力形式統一のため宣言）
#   pr_number : PR 番号。PR へのコメント投稿先 issue_number として使用。必須。
#   pr_url    : PR URL（未使用。呼び出し元との入力形式統一のため宣言）
#   pr_sha    : PR の HEAD コミット SHA。PR コメントのコミット欄に表示。
#
# 【検証モードについて】
#   sf-release.sh を --release オプションなしで実行すると dry-run（検証のみ）になる。
#   Salesforce 側では「クイック デプロイ」の資格取得チェックが行われるが、実際の反映はされない。
#
# ==============================================================================
name: sf-validate（再利用可能）

on:
  workflow_call:
    inputs:
      base_ref:
        description: "マージ先ブランチ名"
        type: string
        default: ""
      head_ref:
        description: "マージ元ブランチ名（フィーチャーブランチ）"
        type: string
        default: ""
      pr_title:
        description: "PR タイトル（未使用）"
        type: string
        default: ""
      pr_number:
        description: "PR 番号（コメント投稿先の特定に使用）"
        type: string
        default: ""
      pr_url:
        description: "PR URL（未使用）"
        type: string
        default: ""
      pr_sha:
        description: "PR の HEAD コミット SHA"
        type: string
        default: ""
    secrets:
      SFDX_AUTH_URL_PROD:
        required: false
      SFDX_AUTH_URL_STG:
        required: false
      SFDX_AUTH_URL_DEV:
        required: false

jobs:
  validate:
    name: Salesforce 検証（本番反映なし・確認のみ）
    runs-on: ubuntu-latest

    # PR へのコメント投稿に必要
    permissions:
      pull-requests: write

    steps:
      # --------------------------------------------------------------------------
      # Step 1: ソースコードのチェックアウト
      # --------------------------------------------------------------------------
      # デフォルト動作（マージ先ブランチに PR ソースをマージした状態）でチェックアウトする。
      # release/<branch>/deploy-target.txt はこのチェックアウト結果に含まれる。
      - name: ソースコードを取得
        uses: actions/checkout@v4

      # --------------------------------------------------------------------------
      # Step 2: Node.js のセットアップ
      # --------------------------------------------------------------------------
      - name: Node.js をインストール
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --------------------------------------------------------------------------
      # Step 3: Salesforce CLI のインストール
      # --------------------------------------------------------------------------
      - name: Salesforce CLI をインストール
        run: npm install -g @salesforce/cli

      # --------------------------------------------------------------------------
      # Step 4: sf-tools のクローン
      # --------------------------------------------------------------------------
      # sf-release.sh の実行に必要な sf-tools 一式をホームディレクトリへ取得する。
      # 全シェルスクリプトと共通ライブラリ（lib/common.sh）に実行権限を付与する。
      - name: 自動化ツール（sf-tools）を取得
        run: |
          git clone https://github.com/tamashimon-create/sf-tools.git "$HOME/sf-tools"
          chmod +x "$HOME/sf-tools/"*.sh "$HOME/sf-tools/lib/"*.sh

      # --------------------------------------------------------------------------
      # Step 5: 接続先 Salesforce 組織の選択
      # --------------------------------------------------------------------------
      # base_ref（マージ先ブランチ）に応じて認証 URL を GITHUB_ENV に書き込む。
      # 次のステップでこの環境変数を使って組織に認証する。
      # develop および上記以外のブランチは開発組織（SFDX_AUTH_URL_DEV）を使用する。
      - name: 接続先組織を選択（マージ先ブランチに応じて切り替え）
        run: |
          BASE="${{ inputs.base_ref }}"
          if   [[ "$BASE" == "main"    ]]; then
            echo "SFDX_AUTH_URL=${{ secrets.SFDX_AUTH_URL_PROD }}" >> "$GITHUB_ENV"
            echo "接続先: 本番組織"
          elif [[ "$BASE" == "staging" ]]; then
            echo "SFDX_AUTH_URL=${{ secrets.SFDX_AUTH_URL_STG }}"  >> "$GITHUB_ENV"
            echo "接続先: ステージング組織"
          else
            echo "SFDX_AUTH_URL=${{ secrets.SFDX_AUTH_URL_DEV }}"  >> "$GITHUB_ENV"
            echo "接続先: 開発組織"
          fi

      # --------------------------------------------------------------------------
      # Step 6: Salesforce 組織への認証
      # --------------------------------------------------------------------------
      # 前ステップで設定した SFDX_AUTH_URL 環境変数を使って認証する。
      # /tmp に書き出し、認証後即削除することでセキュリティリスクを最小化する。
      # --alias ci-org: sf-release.sh が参照するエイリアス名
      - name: Salesforce 組織にログイン
        run: |
          echo "$SFDX_AUTH_URL" > /tmp/sf_auth.txt
          sf org login sfdx-url \
            --sfdx-url-file /tmp/sf_auth.txt \
            --set-default \
            --alias ci-org
          rm -f /tmp/sf_auth.txt

      # --------------------------------------------------------------------------
      # Step 7: デプロイ対象ブランチの設定
      # --------------------------------------------------------------------------
      # sf-release.sh は sf-tools/release/branch_name.txt を読んで
      # release/<branch>/deploy-target.txt のパスを解決する。
      # CI 実行時はローカルと異なり sf-start.sh が動かないため、ここで動的に生成する。
      - name: デプロイ対象ブランチを設定
        run: |
          mkdir -p sf-tools/release
          echo "${{ inputs.head_ref }}" > sf-tools/release/branch_name.txt
          echo "対象ブランチ: ${{ inputs.head_ref }}"

      # --------------------------------------------------------------------------
      # Step 8: Salesforce へのデプロイ検証（本番反映なし）
      # --------------------------------------------------------------------------
      # sf-release.sh を --release オプションなしで実行することで検証モードになる。
      # set +e により sf-release.sh が exit 1 を返しても後続ステップが実行される。
      # 終了コードを GITHUB_OUTPUT に保存し、Step 10 でのマージブロック判定に使用する。
      - name: Salesforce にデプロイ検証を実行（本番反映なし）
        id: sf_validate
        env:
          SF_TARGET_ORG: ci-org
        run: |
          set +e
          bash "$HOME/sf-tools/sf-release.sh" --no-open > /tmp/sf_result.txt 2>&1
          EXIT_CODE=$?
          cat /tmp/sf_result.txt
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      # --------------------------------------------------------------------------
      # Step 9: 検証結果を PR にコメントとして投稿
      # --------------------------------------------------------------------------
      # if: always() により、前ステップが失敗してもコメント投稿は必ず実行される。
      # actions/github-script で GitHub API を呼び出し PR にコメントを投稿する。
      # ログが長い場合は末尾 3000 文字のみ表示し、<details> で折りたたむ。
      # pr_number を issue_number として使用（workflow_call では context.issue が未定義のため）。
      - name: 検証結果を PR に投稿
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let ログ = '';
            try {
              ログ = fs.readFileSync('/tmp/sf_result.txt', 'utf8');
            } catch (e) {
              ログ = '（ログファイルが見つかりません）';
            }
            const 終了コード = parseInt('${{ steps.sf_validate.outputs.exit_code }}') || 0;
            const アイコン = 終了コード === 0 ? '✅' : '❌';
            const 結果   = 終了コード === 0 ? '検証成功' : '検証失敗';
            const 最大文字数 = 3000;
            const 表示ログ = ログ.length > 最大文字数
              ? '...(前半省略)...\n' + ログ.slice(-最大文字数)
              : ログ;
            const 本文 = [
              `## ${アイコン} Salesforce 検証結果: ${結果}`,
              '',
              `| 項目 | 値 |`,
              `| --- | --- |`,
              `| ブランチ | \`${{ inputs.head_ref }}\` → \`${{ inputs.base_ref }}\` |`,
              `| コミット | \`${{ inputs.pr_sha }}\` |`,
              `| 実行モード | 検証のみ（本番反映なし） |`,
              '',
              '<details>',
              '<summary>実行ログ（クリックで展開）</summary>',
              '',
              '```',
              表示ログ,
              '```',
              '',
              '</details>'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: parseInt('${{ inputs.pr_number }}'),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 本文
            });

      # --------------------------------------------------------------------------
      # Step 10: 検証失敗時のマージブロック
      # --------------------------------------------------------------------------
      # if: always() により必ず実行され、sf-release.sh の終了コードをそのまま返す。
      # exit 0 以外の場合、GitHub はこの PR チェックを失敗とみなしマージをブロックする。
      # ブランチ保護ルールで「このチェックを必須」に設定しておく必要がある。
      - name: 検証失敗時はマージをブロック
        if: always()
        run: |
          EXIT_CODE="${{ steps.sf_validate.outputs.exit_code }}"
          exit "${EXIT_CODE:-1}"
