# ==============================================================================
# wf-validate.yml - Salesforce デプロイ前検証（caller）
# ==============================================================================
# ロジックは tama-create/sf-tools の wf-validate-reusable.yml に集約されています。
# このファイルはトリガーと secrets の受け渡しのみを担います。
# ==============================================================================
name: "[validate] デプロイ前検証"

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    uses: tama-create/sf-tools/.github/workflows/wf-validate-reusable.yml@main
    permissions:
      pull-requests: write
      contents: read
    secrets:
      SFDX_AUTH_URL_PROD: ${{ secrets.SFDX_AUTH_URL_PROD }}
      SFDX_AUTH_URL_STG:  ${{ secrets.SFDX_AUTH_URL_STG }}
      SFDX_AUTH_URL_DEV:  ${{ secrets.SFDX_AUTH_URL_DEV }}
