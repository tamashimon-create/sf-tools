# ==============================================================================
# sf-validate.yml - Salesforce PR 検証ワークフロー
# ==============================================================================
# PR 作成・更新時に sf-release.sh (dry-run) を自動実行します。
# レビュアーは「PR が来た = Salesforce 検証済み」と判断できます。
#
# 【セットアップ手順】
# GitHub リポジトリの Settings → Secrets and variables → Actions に以下を追加:
#
#   SFDX_AUTH_URL_DEV   : development ブランチへの PR で使用する組織の認証 URL
#   SFDX_AUTH_URL_STG   : staging     ブランチへの PR で使用する組織の認証 URL
#   SFDX_AUTH_URL_PROD  : main        ブランチへの PR で使用する組織の認証 URL
#
#   取得方法: sf org display --verbose --json | grep sfdxAuthUrl
#   例: force://PlatformCLI::token@domain.salesforce.com
#
#   SF_TOOLS_REPO
#     sf-tools リポジトリの HTTPS URL（認証情報付き）
#     例: https://USERNAME:TOKEN@github.com/your-org/sf-tools.git
#
# 【PR マージ先と使用組織の対応】
#   main        → SFDX_AUTH_URL_PROD（本番組織）
#   staging     → SFDX_AUTH_URL_STG（ステージング組織）
#   development → SFDX_AUTH_URL_DEV（開発組織）
#   その他      → SFDX_AUTH_URL_DEV（フォールバック）
#
# 【前提条件】
#   - リポジトリ名が force- で始まること（check_force_dir の要件）
#   - PR のソースブランチに sf-tools/release/<branch>/deploy-target.txt が含まれること
#     （sf-start.sh 実行時に自動生成されます）
# ==============================================================================

name: Salesforce デプロイ前検証（PR 自動チェック）

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Salesforce 検証（本番反映なし・確認のみ）
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # PR へのコメント投稿に必要

    steps:
      # -------------------------------------------------------------------------
      # 1. リポジトリをチェックアウト
      # -------------------------------------------------------------------------
      - name: ソースコードを取得
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # 2. Node.js セットアップ & Salesforce CLI インストール
      # -------------------------------------------------------------------------
      - name: Node.js をインストール
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Salesforce CLI をインストール
        run: npm install -g @salesforce/cli

      # -------------------------------------------------------------------------
      # 3. sf-tools をセットアップ（~/sf-tools に配置）
      # -------------------------------------------------------------------------
      - name: 自動化ツール（sf-tools）を取得
        run: |
          git clone "${{ secrets.SF_TOOLS_REPO }}" "$HOME/sf-tools"
          chmod +x "$HOME/sf-tools/"*.sh "$HOME/sf-tools/lib/"*.sh

      # -------------------------------------------------------------------------
      # 4. PR マージ先に応じて認証 URL を選択
      #    main → PROD / staging → STG / development（その他） → DEV
      # -------------------------------------------------------------------------
      - name: 接続先組織を選択（マージ先ブランチに応じて切り替え）
        run: |
          BASE="${{ github.base_ref }}"
          if   [[ "$BASE" == "main"        ]]; then
            echo "SFDX_AUTH_URL=${{ secrets.SFDX_AUTH_URL_PROD }}" >> "$GITHUB_ENV"
            echo "TARGET_ENV=PROD（本番）"
          elif [[ "$BASE" == "staging"     ]]; then
            echo "SFDX_AUTH_URL=${{ secrets.SFDX_AUTH_URL_STG }}"  >> "$GITHUB_ENV"
            echo "TARGET_ENV=STG（ステージング）"
          else
            echo "SFDX_AUTH_URL=${{ secrets.SFDX_AUTH_URL_DEV }}"  >> "$GITHUB_ENV"
            echo "TARGET_ENV=DEV（開発）"
          fi
          echo "BASE_REF=$BASE" >> "$GITHUB_ENV"

      # -------------------------------------------------------------------------
      # 5. Salesforce 組織に認証
      # -------------------------------------------------------------------------
      - name: Salesforce 組織にログイン
        run: |
          echo "$SFDX_AUTH_URL" > /tmp/sf_auth.txt
          sf org login sfdx-url \
            --sfdx-url-file /tmp/sf_auth.txt \
            --set-default \
            --alias ci-org
          rm -f /tmp/sf_auth.txt

      # -------------------------------------------------------------------------
      # 6. ブランチ名ファイルを設定
      #    sf-release.sh は sf-tools/release/branch_name.txt を参照します
      # -------------------------------------------------------------------------
      - name: デプロイ対象ブランチを設定
        run: |
          mkdir -p sf-tools/release
          echo "${{ github.head_ref }}" > sf-tools/release/branch_name.txt
          echo "[INFO] ブランチ: ${{ github.head_ref }}"

      # -------------------------------------------------------------------------
      # 7. sf-release.sh で dry-run 検証を実行
      # -------------------------------------------------------------------------
      - name: Salesforce にデプロイ検証を実行（本番反映なし）
        id: sf_validate
        env:
          SF_TARGET_ORG: ci-org
        run: |
          set +e
          bash "$HOME/sf-tools/sf-release.sh" --no-open > /tmp/sf_result.txt 2>&1
          SF_EXIT=$?
          cat /tmp/sf_result.txt
          echo "exit_code=$SF_EXIT" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------------------------
      # 8. 検証結果を PR にコメント投稿
      # -------------------------------------------------------------------------
      - name: 検証結果を PR に投稿
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result = '';
            try {
              result = fs.readFileSync('/tmp/sf_result.txt', 'utf8');
            } catch (e) {
              result = '(ログファイルが見つかりません)';
            }
            const exitCode = parseInt('${{ steps.sf_validate.outputs.exit_code }}') || 0;
            const icon   = exitCode === 0 ? '✅' : '❌';
            const status = exitCode === 0 ? '検証成功' : '検証失敗';
            const maxLen = 3000;
            const log = result.length > maxLen
              ? '...(前半省略)...\n' + result.slice(-maxLen)
              : result;
            const body = [
              `## ${icon} Salesforce 検証結果: ${status}`,
              '',
              `| 項目 | 値 |`,
              `| --- | --- |`,
              `| ブランチ | \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\` |`,
              `| コミット | \`${{ github.event.pull_request.head.sha }}\` |`,
              `| 実行モード | dry-run（検証のみ） |`,
              '',
              '<details>',
              '<summary>実行ログ（クリックで展開）</summary>',
              '',
              '```',
              log,
              '```',
              '',
              '</details>'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # -------------------------------------------------------------------------
      # 9. 検証失敗時は CI を失敗扱いにする
      # -------------------------------------------------------------------------
      - name: 検証失敗時はマージをブロック
        if: always()
        run: |
          EXIT_CODE="${{ steps.sf_validate.outputs.exit_code }}"
          exit "${EXIT_CODE:-1}"
