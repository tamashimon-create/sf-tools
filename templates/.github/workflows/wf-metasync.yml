# ==============================================================================
# wf-metasync.yml - Salesforce メタデータ自動同期（caller）
# ==============================================================================
# ロジックは tama-create/sf-tools の wf-metasync-reusable.yml に集約されています。
# このファイルはトリガーと secrets の受け渡しのみを担います。
# ==============================================================================
name: "[metasync] メタ同期"

on:
  schedule:
    - cron: "0 0-10 * * 1-5"
  workflow_dispatch:

jobs:
  metasync:
    uses: tama-create/sf-tools/.github/workflows/wf-metasync-reusable.yml@main
    permissions:
      contents: write
    secrets:
      SFDX_AUTH_URL_PROD: ${{ secrets.SFDX_AUTH_URL_PROD }}
      PAT_TOKEN:          ${{ secrets.PAT_TOKEN }}
