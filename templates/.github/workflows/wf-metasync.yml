# ==============================================================================
# wf-metasync.yml - Salesforce メタデータ自動同期
# ==============================================================================
#
# 【概要】
#   Salesforce 本番組織の最新メタデータを取得し、Git の main ブランチへ自動同期する。
#
# 【必要な GitHub Secrets（このリポジトリに設定すること）】
#   SF_PRIVATE_KEY       : 秘密鍵（PEM 形式・全組織共通）
#   SF_CONSUMER_KEY_PROD : 本番組織の Connected App コンシューマーキー
#   PAT_TOKEN            : GitHub PAT（ブランチ保護ルールのバイパスに使用）
#
# 【必要な GitHub Variables（このリポジトリに設定すること）】
#   SF_USERNAME_PROD     : 本番組織の接続ユーザー名
#   SF_INSTANCE_URL_PROD : 本番組織の接続 URL（https://login.salesforce.com 等）
#
# ==============================================================================
on:
  schedule:
    - cron: "0 0-10 * * 1-5"
  workflow_dispatch:

jobs:
  sync:
    name: メタデータ同期
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --------------------------------------------------------------------------
      # Step 1: リポジトリの main ブランチを完全な履歴付きでチェックアウト
      # --------------------------------------------------------------------------
      - name: ソースコードを取得
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      # --------------------------------------------------------------------------
      # Step 2: Node.js のセットアップ
      # --------------------------------------------------------------------------
      - name: Node.js をインストール
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------------------------------------------------------
      # Step 3: Java のセットアップ（SGD の実行に必要）
      # --------------------------------------------------------------------------
      - name: Java をインストール（差分抽出ツール用）
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # --------------------------------------------------------------------------
      # Step 4: Salesforce CLI のインストール
      # --------------------------------------------------------------------------
      - name: Salesforce CLI をインストール
        run: npm install --global @salesforce/cli

      # --------------------------------------------------------------------------
      # Step 5: Salesforce Git Delta（SGD）プラグインのインストール
      # --------------------------------------------------------------------------
      - name: 差分抽出ツール（Salesforce Git Delta）をインストール
        run: echo y | sf plugins install sfdx-git-delta

      # --------------------------------------------------------------------------
      # Step 6: Salesforce 本番組織への認証
      # --------------------------------------------------------------------------
      - name: Salesforce 組織にログイン
        run: |
          echo "${{ secrets.SF_PRIVATE_KEY }}" | base64 -d > /tmp/server.key
          sf org login jwt \
            --client-id    "${{ secrets.SF_CONSUMER_KEY_PROD }}" \
            --jwt-key-file /tmp/server.key \
            --username     "${{ vars.SF_USERNAME_PROD }}" \
            --instance-url "${{ vars.SF_INSTANCE_URL_PROD }}" \
            --set-default \
            --alias prod
          rm -f /tmp/server.key

      # --------------------------------------------------------------------------
      # Step 7: Git コミット用ユーザー情報の設定
      # --------------------------------------------------------------------------
      - name: Git ユーザー情報を設定
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # --------------------------------------------------------------------------
      # Step 8: sf-tools のクローン
      # --------------------------------------------------------------------------
      - name: 自動化ツール（sf-tools）を取得
        run: |
          git clone -b ${{ vars.SF_TOOLS_BRANCH || 'main' }} https://github.com/tama-create/sf-tools.git ~/sf-tools
          chmod +x ~/sf-tools/bin/sf-metasync.sh

      # --------------------------------------------------------------------------
      # Step 9: メタデータ取得・Git 同期の実行
      # --------------------------------------------------------------------------
      - name: メタデータ取得・Git 同期を実行
        run: ~/sf-tools/bin/sf-metasync.sh
