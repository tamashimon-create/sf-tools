# ==============================================================================
# wf-release.yml - Salesforce 本番リリース
# ==============================================================================
#
# 【概要】
#   PR マージをトリガーに、マージ先ブランチに対応する Salesforce 組織へリリースを実行する。
#
# 【必要な GitHub Secrets（このリポジトリに設定すること）】
#   SF_PRIVATE_KEY       : 秘密鍵（PEM 形式・全組織共通）
#   SF_CONSUMER_KEY_PROD : 本番組織の Connected App コンシューマーキー
#   SF_CONSUMER_KEY_STG  : ステージング組織の Connected App コンシューマーキー
#   SF_CONSUMER_KEY_DEV  : 開発組織の Connected App コンシューマーキー
#   SLACK_BOT_TOKEN      : Slack API の Bot Token
#
# 【必要な GitHub Variables（このリポジトリに設定すること）】
#   SF_USERNAME_PROD     : 本番組織の接続ユーザー名
#   SF_USERNAME_STG      : ステージング組織の接続ユーザー名
#   SF_USERNAME_DEV      : 開発組織の接続ユーザー名
#   SF_INSTANCE_URL_PROD : 本番組織の接続 URL（https://login.salesforce.com 等）
#   SF_INSTANCE_URL_STG  : ステージング組織の接続 URL
#   SF_INSTANCE_URL_DEV  : 開発組織の接続 URL
#   SLACK_CHANNEL_ID     : 通知先 Slack チャンネル ID
#
# ==============================================================================
on:
  pull_request:
    types: [closed]
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:

jobs:
  check-branch:
    name: 対象ファイル確認
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: デプロイ対象ファイルを確認
        run: |
          # workflow_dispatch の場合はスキップしない
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HEAD="${{ github.event.pull_request.head.ref }}"
          DEPLOY="sf-tools/release/${HEAD}/deploy-target.txt"
          REMOVE="sf-tools/release/${HEAD}/remove-target.txt"
          has_content() {
            [[ -f "$1" ]] && grep -qvE '^\s*(#|$|\[files\]|\[members\])' "$1"
          }
          if ! has_content "$DEPLOY" && ! has_content "$REMOVE"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "デプロイ対象なし（${DEPLOY} / ${REMOVE} に内容なし）のためスキップします。"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: リリース実行
    needs: check-branch
    if: (github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch') && needs.check-branch.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------------------------------
      # Step 1: リリース先情報をログ・GitHub Actions Summary に記録
      # --------------------------------------------------------------------------
      - name: リリース先を確認
        run: |
          BRANCH="${{ github.event.pull_request.base.ref || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            ENV_LABEL="🚀 本番組織 (prod)"
          elif [ "$BRANCH" = "staging" ]; then
            ENV_LABEL="🧪 ステージング Sandbox (staging)"
          else
            ENV_LABEL="🔧 結合 Sandbox (develop)"
          fi
          PR_TITLE="${{ github.event.pull_request.title || '' }}"
          PR_NUMBER="${{ github.event.pull_request.number || '' }}"

          echo "::notice title=リリース先::${ENV_LABEL} | ブランチ: ${BRANCH}"

          echo "## 🎯 Salesforce Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| リリース先 | ${ENV_LABEL} |" >> $GITHUB_STEP_SUMMARY
          echo "| ブランチ | \`${BRANCH}\` |" >> $GITHUB_STEP_SUMMARY
          if [ -n "$PR_NUMBER" ]; then
            echo "| PR | #${PR_NUMBER} ${PR_TITLE} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| 実行日時 | $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S JST') |" >> $GITHUB_STEP_SUMMARY

      # --------------------------------------------------------------------------
      # Step 2: マージ先ブランチをチェックアウト
      # --------------------------------------------------------------------------
      - name: ソースコードを取得
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
          fetch-depth: 0

      # --------------------------------------------------------------------------
      # Step 3: Node.js のセットアップ
      # --------------------------------------------------------------------------
      - name: Node.js をインストール
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------------------------------------------------------
      # Step 4: Salesforce CLI のインストール
      # --------------------------------------------------------------------------
      - name: Salesforce CLI をインストール
        run: npm install --global @salesforce/cli

      # --------------------------------------------------------------------------
      # Step 5: マージ先ブランチに対応する Salesforce 組織への認証
      # --------------------------------------------------------------------------
      - name: 本番組織にログイン（JWT）
        if: ${{ (github.event.pull_request.base.ref || github.ref_name) == 'main' }}
        run: |
          echo "${{ secrets.SF_PRIVATE_KEY }}" | base64 -d > /tmp/server.key
          sf org login jwt \
            --client-id    "${{ secrets.SF_CONSUMER_KEY_PROD }}" \
            --jwt-key-file /tmp/server.key \
            --username     "${{ vars.SF_USERNAME_PROD }}" \
            --instance-url "${{ vars.SF_INSTANCE_URL_PROD }}" \
            --set-default --alias prod
          rm -f /tmp/server.key

      - name: ステージング組織にログイン（JWT）
        if: ${{ (github.event.pull_request.base.ref || github.ref_name) == 'staging' }}
        run: |
          echo "${{ secrets.SF_PRIVATE_KEY }}" | base64 -d > /tmp/server.key
          sf org login jwt \
            --client-id    "${{ secrets.SF_CONSUMER_KEY_STG }}" \
            --jwt-key-file /tmp/server.key \
            --username     "${{ vars.SF_USERNAME_STG }}" \
            --instance-url "${{ vars.SF_INSTANCE_URL_STG }}" \
            --set-default --alias staging
          rm -f /tmp/server.key

      - name: 開発組織にログイン（JWT）
        if: ${{ (github.event.pull_request.base.ref || github.ref_name) == 'develop' }}
        run: |
          echo "${{ secrets.SF_PRIVATE_KEY }}" | base64 -d > /tmp/server.key
          sf org login jwt \
            --client-id    "${{ secrets.SF_CONSUMER_KEY_DEV }}" \
            --jwt-key-file /tmp/server.key \
            --username     "${{ vars.SF_USERNAME_DEV }}" \
            --instance-url "${{ vars.SF_INSTANCE_URL_DEV }}" \
            --set-default --alias develop
          rm -f /tmp/server.key

      # --------------------------------------------------------------------------
      # Step 6: sf-tools のクローン
      # --------------------------------------------------------------------------
      - name: 自動化ツール（sf-tools）を取得
        run: git clone -b ${{ vars.SF_TOOLS_BRANCH || 'main' }} https://github.com/tama-create/sf-tools.git ~/sf-tools

      # --------------------------------------------------------------------------
      # Step 7: Salesforce へのリリース実行
      # --------------------------------------------------------------------------
      - name: Salesforce にリリースを実行
        run: |
          BRANCH="${{ github.event.pull_request.base.ref || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            TARGET="prod"
          elif [ "$BRANCH" = "staging" ]; then
            TARGET="staging"
          else
            TARGET="develop"
          fi
          SOURCE="${{ github.event.pull_request.head.ref || github.ref_name }}"
          mkdir -p sf-tools/release
          echo "$SOURCE" > sf-tools/release/branch_name.txt
          chmod +x ~/sf-tools/sf-release.sh
          ~/sf-tools/sf-release.sh --release --no-open --target "$TARGET"

      # --------------------------------------------------------------------------
      # Step 8: Slack への結果通知
      # --------------------------------------------------------------------------
      - name: Slack に結果を通知
        if: always()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
        run: |
          BRANCH="${{ github.event.pull_request.base.ref || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            ENV_LABEL="🚀 本番組織 (prod)"
          elif [ "$BRANCH" = "staging" ]; then
            ENV_LABEL="🧪 ステージング Sandbox (staging)"
          else
            ENV_LABEL="🔧 統合検証 Sandbox (develop)"
          fi

          PR_TITLE="${{ github.event.pull_request.title || '' }}"
          PR_NUMBER="${{ github.event.pull_request.number || '' }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATETIME=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S JST')

          if [ "${{ job.status }}" = "success" ]; then
            ICON=":white_check_mark:"
            STATUS_TEXT="リリース成功"
          else
            ICON=":x:"
            STATUS_TEXT="リリース失敗"
          fi

          PR_TEXT=""
          if [ -n "$PR_NUMBER" ]; then
            PR_TEXT="\n• PR: #${PR_NUMBER} ${PR_TITLE}"
          fi

          MESSAGE="${ICON} *Salesforce Release ${STATUS_TEXT}*\n• リリース先: ${ENV_LABEL}\n• ブランチ: \`${BRANCH}\`${PR_TEXT}\n• 実行日時: ${DATETIME}\n• <${RUN_URL}|Actions ログを見る>"
          PAYLOAD="{\"channel\": \"${SLACK_CHANNEL_ID}\", \"text\": \"${MESSAGE}\"}"

          RESPONSE=$(curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Slack response: $RESPONSE"
