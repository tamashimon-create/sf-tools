# ==============================================================================
# wf-release.yml - Salesforce 本番リリース（caller）
# ==============================================================================
# ロジックは tama-create/sf-tools の wf-release-reusable.yml に集約されています。
# このファイルはトリガーと secrets の受け渡しのみを担います。
# ==============================================================================
name: "[release] デプロイ"

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:

jobs:
  release:
    uses: tama-create/sf-tools/.github/workflows/wf-release-reusable.yml@main
    secrets:
      SFDX_AUTH_URL_PROD: ${{ secrets.SFDX_AUTH_URL_PROD }}
      SFDX_AUTH_URL_STG:  ${{ secrets.SFDX_AUTH_URL_STG }}
      SFDX_AUTH_URL_DEV:  ${{ secrets.SFDX_AUTH_URL_DEV }}
      SLACK_BOT_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID:   ${{ secrets.SLACK_CHANNEL_ID }}
