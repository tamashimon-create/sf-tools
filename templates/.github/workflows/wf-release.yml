# ==============================================================================
# wf-release.yml - Salesforce 本番リリース（PR マージ後自動実行）
# ==============================================================================
#
# 【概要】
#   PR マージをトリガーに、マージ先ブランチに対応する Salesforce 組織へリリースを実行する。
#
# 【ブランチと組織の対応】
#   main     → 本番組織（SFDX_AUTH_URL_PROD / エイリアス: prod）
#   staging  → ステージング Sandbox（SFDX_AUTH_URL_STG / エイリアス: staging）
#   develop  → 結合検証 Sandbox（SFDX_AUTH_URL_DEV / エイリアス: develop）
#
# 【処理フロー】
#   1. リリース先情報をログ・GitHub Actions Summary に記録
#   2. マージ先ブランチをチェックアウト
#   3. Node.js / Salesforce CLI をインストール
#   4. マージ先ブランチに対応する Salesforce 組織に認証
#   5. sf-tools をクローンして sf-release.sh を取得
#   6. release/<branch>/deploy-target.txt に基づいてデプロイを実行
#   7. 成否に関わらず Slack へ結果を通知
#
# 【必要な GitHub Secrets】
#   SFDX_AUTH_URL_PROD : 本番組織の認証 URL（main ブランチのリリース時に使用）
#   SFDX_AUTH_URL_STG  : ステージング組織の認証 URL（staging ブランチのリリース時に使用）
#   SFDX_AUTH_URL_DEV  : 開発組織の認証 URL（develop ブランチのリリース時に使用）
#   SLACK_BOT_TOKEN    : Slack API の Bot Token（Slack 通知に使用）
#   SLACK_CHANNEL_ID   : 通知先 Slack チャンネル ID
#
# ==============================================================================
name: "[release] デプロイ"

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:

jobs:
  check-branch:
    name: 対象ファイル確認
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: デプロイ対象ファイルを確認
        run: |
          # workflow_dispatch の場合はスキップしない
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HEAD="${{ github.event.pull_request.head.ref }}"
          DEPLOY="sf-tools/release/${HEAD}/deploy-target.txt"
          REMOVE="sf-tools/release/${HEAD}/remove-target.txt"
          has_content() {
            [[ -f "$1" ]] && grep -qvE '^\s*(#|$|\[files\]|\[members\])' "$1"
          }
          if ! has_content "$DEPLOY" && ! has_content "$REMOVE"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "デプロイ対象なし（${DEPLOY} / ${REMOVE} に内容なし）のためスキップします。"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: リリース実行
    needs: check-branch
    if: (github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch') && needs.check-branch.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------------------------------
      # Step 1: リリース先情報をログ・GitHub Actions Summary に記録
      # --------------------------------------------------------------------------
      # マージ先ブランチ名から対象組織を判定し、視認しやすい形でログに出力する。
      # ::notice コマンドで Actions のログビューに目立つ形で表示される。
      # $GITHUB_STEP_SUMMARY に書き込むことで Actions の Summary タブにも表示される。
      - name: リリース先を確認
        run: |
          BRANCH="${{ github.event.pull_request.base.ref || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            ENV_LABEL="🚀 本番組織 (prod)"
          elif [ "$BRANCH" = "staging" ]; then
            ENV_LABEL="🧪 ステージング Sandbox (staging)"
          else
            ENV_LABEL="🔧 結合 Sandbox (develop)"
          fi
          PR_TITLE="${{ github.event.pull_request.title || '' }}"
          PR_NUMBER="${{ github.event.pull_request.number || '' }}"

          echo "::notice title=リリース先::${ENV_LABEL} | ブランチ: ${BRANCH}"

          echo "## 🎯 Salesforce Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| リリース先 | ${ENV_LABEL} |" >> $GITHUB_STEP_SUMMARY
          echo "| ブランチ | \`${BRANCH}\` |" >> $GITHUB_STEP_SUMMARY
          if [ -n "$PR_NUMBER" ]; then
            echo "| PR | #${PR_NUMBER} ${PR_TITLE} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| 実行日時 | $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S JST') |" >> $GITHUB_STEP_SUMMARY

      # --------------------------------------------------------------------------
      # Step 2: マージ先ブランチをチェックアウト
      # --------------------------------------------------------------------------
      # リリース対象のコードとリリース定義ファイル（deploy-target.txt 等）を取得する。
      # sf-release.sh がブランチ名を git symbolic-ref で取得するため fetch-depth: 0 が必要。
      - name: ソースコードを取得
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
          fetch-depth: 0

      # --------------------------------------------------------------------------
      # Step 3: Node.js のセットアップ
      # --------------------------------------------------------------------------
      - name: Node.js をインストール
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------------------------------------------------------
      # Step 4: Salesforce CLI のインストール
      # --------------------------------------------------------------------------
      - name: Salesforce CLI をインストール
        run: npm install --global @salesforce/cli

      # --------------------------------------------------------------------------
      # Step 5a-c: マージ先ブランチに対応する Salesforce 組織への認証
      # --------------------------------------------------------------------------
      # base_ref の値に応じて使用する認証 URL を切り替える。
      # 3 つのステップはそれぞれ if 条件で排他実行されるため、常に 1 つだけ実行される。
      # 認証完了後は即座に認証ファイルを削除してセキュリティリスクを最小化する。
      - name: 本番組織にログイン
        if: ${{ (github.event.pull_request.base.ref || github.ref_name) == 'main' }}
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_PROD }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --set-default --alias prod
          rm -f auth.txt

      - name: ステージング組織にログイン
        if: ${{ (github.event.pull_request.base.ref || github.ref_name) == 'staging' }}
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_STG }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --set-default --alias staging
          rm -f auth.txt

      - name: 開発組織にログイン
        if: ${{ (github.event.pull_request.base.ref || github.ref_name) == 'develop' }}
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_DEV }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --set-default --alias develop
          rm -f auth.txt

      # --------------------------------------------------------------------------
      # Step 6: sf-tools のクローン
      # --------------------------------------------------------------------------
      # sf-release.sh の実行に必要な sf-tools 一式をホームディレクトリへ取得する。
      - name: 自動化ツール（sf-tools）を取得
        run: git clone https://github.com/tama-create/sf-tools.git ~/sf-tools

      # --------------------------------------------------------------------------
      # Step 7: Salesforce へのリリース実行
      # --------------------------------------------------------------------------
      # sf-release.sh は release/<branch>/deploy-target.txt を読んでデプロイ対象を決定する。
      # branch_name.txt にフィーチャーブランチ名を書き込むことで、どのブランチの
      # release/ ディレクトリを参照するかを sf-release.sh に伝える。
      # （sf-start.sh 実行時に自動生成される branch_name.txt の代替として CI 側で動的生成）
      - name: Salesforce にリリースを実行
        run: |
          BRANCH="${{ github.event.pull_request.base.ref || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            TARGET="prod"
          elif [ "$BRANCH" = "staging" ]; then
            TARGET="staging"
          else
            TARGET="develop"
          fi
          SOURCE="${{ github.event.pull_request.head.ref || github.ref_name }}"
          mkdir -p sf-tools/release
          echo "$SOURCE" > sf-tools/release/branch_name.txt
          chmod +x ~/sf-tools/sf-release.sh
          ~/sf-tools/sf-release.sh --release --no-open --target "$TARGET"

      # --------------------------------------------------------------------------
      # Step 8: Slack への結果通知
      # --------------------------------------------------------------------------
      # if: always() により、前ステップが失敗してもこのステップは必ず実行される。
      # job.status で成否を判定し、適切なアイコン・メッセージを組み立てて投稿する。
      # RUN_URL は Actions のログへの直リンクで、Slack から素早くログを確認できる。
      - name: Slack に結果を通知
        if: always()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          BRANCH="${{ github.event.pull_request.base.ref || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            ENV_LABEL="🚀 本番組織 (prod)"
          elif [ "$BRANCH" = "staging" ]; then
            ENV_LABEL="🧪 ステージング Sandbox (staging)"
          else
            ENV_LABEL="🔧 統合検証 Sandbox (develop)"
          fi

          PR_TITLE="${{ github.event.pull_request.title || '' }}"
          PR_NUMBER="${{ github.event.pull_request.number || '' }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATETIME=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S JST')

          if [ "${{ job.status }}" = "success" ]; then
            ICON=":white_check_mark:"
            STATUS_TEXT="リリース成功"
          else
            ICON=":x:"
            STATUS_TEXT="リリース失敗"
          fi

          PR_TEXT=""
          if [ -n "$PR_NUMBER" ]; then
            PR_TEXT="\n• PR: #${PR_NUMBER} ${PR_TITLE}"
          fi

          MESSAGE="${ICON} *Salesforce Release ${STATUS_TEXT}*\n• リリース先: ${ENV_LABEL}\n• ブランチ: \`${BRANCH}\`${PR_TEXT}\n• 実行日時: ${DATETIME}\n• <${RUN_URL}|Actions ログを見る>"
          PAYLOAD="{\"channel\": \"${SLACK_CHANNEL_ID}\", \"text\": \"${MESSAGE}\"}"

          RESPONSE=$(curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Slack response: $RESPONSE"
