# ==============================================================================
# wf-propagate.yml - ブランチ伝播
# ==============================================================================
#
# 【概要】
#   main への PR マージ後、staging と develop ブランチへ変更を直接伝播する。
#
# 【必要な GitHub Secrets（このリポジトリに設定すること）】
#   PAT_TOKEN        : GitHub PAT（ブランチ保護ルールのバイパスに使用）
#   SLACK_BOT_TOKEN  : Slack API の Bot Token（コンフリクト時の通知に使用）
#
# 【必要な GitHub Variables（このリポジトリに設定すること）】
#   SLACK_CHANNEL_ID : 通知先 Slack チャンネル ID
#
# ==============================================================================
on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  propagate:
    name: 下流伝播
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --------------------------------------------------------------------------
      # Step 1: 全履歴付きでリポジトリをチェックアウト
      # --------------------------------------------------------------------------
      - name: ソースコードを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      # --------------------------------------------------------------------------
      # Step 2: Git コミット用ユーザー情報の設定
      # --------------------------------------------------------------------------
      - name: Git ユーザー情報を設定
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # --------------------------------------------------------------------------
      # Step 3: main → staging へ変更を伝播
      # --------------------------------------------------------------------------
      - name: main から staging へ変更を伝播
        id: merge_staging
        if: ${{ (github.event.pull_request.base.ref || github.ref_name) == 'main' }}
        run: |
          git checkout staging
          if git merge origin/main --no-edit; then
            git push origin staging
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            echo "::error title=コンフリクト::main → staging のマージでコンフリクトが発生しました。手動で解消してください。"
          fi

      # --------------------------------------------------------------------------
      # Step 4: main → develop へ変更を伝播
      # --------------------------------------------------------------------------
      - name: main から develop へ変更を伝播
        id: merge_develop
        if: ${{ (github.event.pull_request.base.ref || github.ref_name) == 'main' }}
        run: |
          git checkout develop
          if git merge origin/main --no-edit; then
            git push origin develop
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            echo "::error title=コンフリクト::main → develop のマージでコンフリクトが発生しました。手動で解消してください。"
          fi

      # --------------------------------------------------------------------------
      # Step 5: コンフリクト発生時の Slack 通知
      # --------------------------------------------------------------------------
      - name: コンフリクト発生時に Slack へ通知
        if: |
          always() && (github.event.pull_request.base.ref || github.ref_name) == 'main' && (
            steps.merge_staging.outputs.result == 'conflict' ||
            steps.merge_develop.outputs.result == 'conflict'
          )
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
        run: |
          CONFLICTS=""
          if [ "${{ steps.merge_staging.outputs.result }}" = "conflict" ]; then
            CONFLICTS="staging"
          fi
          if [ "${{ steps.merge_develop.outputs.result }}" = "conflict" ]; then
            CONFLICTS="${CONFLICTS:+$CONFLICTS, }develop"
          fi

          PR_TITLE="${{ github.event.pull_request.title || '' }}"
          PR_NUMBER="${{ github.event.pull_request.number || '' }}"
          PR_URL="${{ github.event.pull_request.html_url || '' }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATETIME=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S JST')

          PR_TEXT=""
          if [ -n "$PR_NUMBER" ]; then
            PR_TEXT="\n• PR: <${PR_URL}|#${PR_NUMBER} ${PR_TITLE}>"
          fi

          MESSAGE=":rotating_light: *ブランチ伝播でコンフリクトが発生しました*\n• main → \`${CONFLICTS}\` のマージに失敗\n• 手動でコンフリクトを解消してください${PR_TEXT}\n• 実行日時: ${DATETIME}\n• <${RUN_URL}|Actions ログを見る>"
          PAYLOAD="{\"channel\": \"${SLACK_CHANNEL_ID}\", \"text\": \"${MESSAGE}\"}"

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # --------------------------------------------------------------------------
      # Step 6: コンフリクトがあった場合はジョブを失敗させる
      # --------------------------------------------------------------------------
      - name: コンフリクト発生時はジョブを失敗させる
        if: |
          always() && (github.event.pull_request.base.ref || github.ref_name) == 'main' && (
            steps.merge_staging.outputs.result == 'conflict' ||
            steps.merge_develop.outputs.result == 'conflict'
          )
        run: exit 1
