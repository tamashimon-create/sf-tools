# ==============================================================================
# wf-propagate.yml - ブランチ伝播（caller）
# ==============================================================================
# ロジックは tama-create/sf-tools の wf-propagate-reusable.yml に集約されています。
# このファイルはトリガーと secrets の受け渡しのみを担います。
# ==============================================================================
name: "[propagate] ブランチ伝播"

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  propagate:
    uses: tama-create/sf-tools/.github/workflows/wf-propagate-reusable.yml@main
    permissions:
      contents: write
    secrets:
      PAT_TOKEN:        ${{ secrets.PAT_TOKEN }}
      SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
