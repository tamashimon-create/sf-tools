# ==============================================================================
# wf-sequence.yml - Salesforce マージ順序チェック（caller）
# ==============================================================================
# ロジックは tama-create/sf-tools の wf-sequence-reusable.yml に集約されています。
# このファイルはトリガーと secrets の受け渡しのみを担います。
# ==============================================================================
name: "[sequence] マージ順序チェック"

on:
  pull_request:
    branches:
      - main
      - staging

jobs:
  sequence:
    uses: tama-create/sf-tools/.github/workflows/wf-sequence-reusable.yml@main
    permissions:
      contents: read
    secrets:
      SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
