# ブランチへ変更を伝播（main マージ後自動実行）
name: ブランチへ変更を伝播（main マージ後自動実行）

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  call:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    uses: tamashimon-create/sf-tools/.github/workflows/sf-propagate-reusable.yml@main
    with:
      base_ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
      head_ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      pr_title: ${{ github.event.pull_request.title || '' }}
      pr_number: "${{ github.event.pull_request.number }}"
      pr_url: ${{ github.event.pull_request.html_url || '' }}
      pr_sha: ${{ github.event.pull_request.head.sha || '' }}
    secrets: inherit
